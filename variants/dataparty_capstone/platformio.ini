; ============================================================
; DataParty Capstone — dual-radio variant (TEMPORARY)
; Hardware: ESP32-S3FH4R2 + SX1281MLTRT (2.4GHz) + SX1276MLTRT (915MHz)
;
; Two radio environments share one board definition:
;   dataparty_capstone_2ghz_*  — SX1281 2.4GHz ELRS (AT2401C PA)
;   dataparty_capstone_915_*   — SX1276 915MHz LoRa
;
; TODO: Verify SPI pin values below from KiCad schematic source.
;       Confirmed: SX1281 DIO1=8, BUSY=9, TXEN=39, RXEN=40
; ============================================================

; ----- Shared board config (all pins, both radios) ----------

[dataparty_capstone_base]
extends = esp32_base
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.arduino.memory_type = opi_opi   ; 2MB OPI PSRAM
build_flags =
  ${esp32_base.build_flags}
  -I variants/dataparty_capstone
  -D DATAPARTY_CAPSTONE
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D PIN_USER_BTN=0
  ; --- SX1281 pins (SPI2, IOMUX — VERIFY from KiCad) ---
  -D P_SX1281_NSS=10
  -D P_SX1281_SCLK=12
  -D P_SX1281_MOSI=11
  -D P_SX1281_MISO=13
  -D P_SX1281_DIO1=8
  -D P_SX1281_BUSY=9
  -D P_SX1281_TXEN=39
  -D P_SX1281_RXEN=40
  ; --- SX1276 pins (SPI3, GPIO matrix — VERIFY from KiCad) ---
  -D P_SX1276_NSS=33
  -D P_SX1276_SCLK=36
  -D P_SX1276_MOSI=35
  -D P_SX1276_MISO=37
  -D P_SX1276_DIO0=10
  -D P_SX1276_DIO1=20
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/dataparty_capstone>
lib_deps =
  ${esp32_base.lib_deps}

; ----- 2.4GHz radio environments (SX1281) -------------------

[dataparty_capstone_2ghz]
extends = dataparty_capstone_base
build_flags =
  ${dataparty_capstone_base.build_flags}
  -U RADIOLIB_EXCLUDE_SX128X
  -D RADIO_IS_SX128X=1
  -D P_LORA_NSS=P_SX1281_NSS
  -D P_LORA_SCLK=P_SX1281_SCLK
  -D P_LORA_MOSI=P_SX1281_MOSI
  -D P_LORA_MISO=P_SX1281_MISO
  -D P_LORA_DIO_1=P_SX1281_DIO1
  -D P_LORA_BUSY=P_SX1281_BUSY
  -D P_LORA_RESET=RADIOLIB_NC
  -D SX128X_TXEN=P_SX1281_TXEN
  -D SX128X_RXEN=P_SX1281_RXEN
  -D LORA_FREQ=2400.0
  -D LORA_BW=812.5
  -D LORA_SF=9
  -D LORA_CR=7
  -D LORA_TX_POWER=20
  -D RADIO_CLASS=CustomSX1281
  -D WRAPPER_CLASS=CustomSX1281Wrapper

[env:dataparty_capstone_2ghz_Repeater]
extends = dataparty_capstone_2ghz
build_src_filter = ${dataparty_capstone_2ghz.build_src_filter}
  +<../examples/simple_repeater/main.cpp>
build_flags =
  ${dataparty_capstone_2ghz.build_flags}
  -D ADVERT_NAME='"Capstone 2.4G Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=8
lib_deps =
  ${dataparty_capstone_2ghz.lib_deps}
  ${esp32_ota.lib_deps}

; ----- 915MHz radio environments (SX1276) -------------------

[dataparty_capstone_915]
extends = dataparty_capstone_base
build_flags =
  ${dataparty_capstone_base.build_flags}
  -D P_LORA_NSS=P_SX1276_NSS
  -D P_LORA_SCLK=P_SX1276_SCLK
  -D P_LORA_MOSI=P_SX1276_MOSI
  -D P_LORA_MISO=P_SX1276_MISO
  -D P_LORA_DIO_0=P_SX1276_DIO0
  -D P_LORA_DIO_1=P_SX1276_DIO1
  -D P_LORA_RESET=RADIOLIB_NC
  -D SX127X_CURRENT_LIMIT=120
  ; SX176X_RXEN/TXEN (RF_MOD switch): TODO identify GPIO from schematic
  -D LORA_FREQ=915.0
  -D LORA_BW=250
  -D LORA_SF=10
  -D LORA_CR=5
  -D LORA_TX_POWER=20
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper

[env:dataparty_capstone_915_Repeater]
extends = dataparty_capstone_915
build_src_filter = ${dataparty_capstone_915.build_src_filter}
  +<../examples/simple_repeater/main.cpp>
build_flags =
  ${dataparty_capstone_915.build_flags}
  -D ADVERT_NAME='"Capstone 915 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=8
lib_deps =
  ${dataparty_capstone_915.lib_deps}
  ${esp32_ota.lib_deps}
