; ============================================================
; MeshTNC Ultra — single firmware, dual-radio (TEMPORARY)
; Hardware: ESP32-S3FH4R2 + SX1281MLTRT (2.4GHz) + SX1276MLTRT (915MHz)
;           Two independent RF switches (RFT25W6630ATF09), one per radio, shared coaxial output
;
; Both radios are compiled into one firmware image.
; Radio selection and frequency parameters are handled in target.cpp —
; NOT via build flags.
;
; Pin verification status (netlist-verified from KiCad schematic export):
;   All pins confirmed. SX1281 DIO1/BUSY were swapped in earlier PDF analysis — corrected here.
;   Both radio NRESETs tied to CHIP_PU (hardware reset), not a GPIO — use RADIOLIB_NC for reset.
;   GPIO14 drives U8 VCTL (SX1281-side RFASWA630ATF09 RF switch after AT2401C PA).
;   SX1276 RF switch (U6) VCTL driven directly by SX1276 RXTX/RF_MOD — no ESP32 GPIO needed.
; ============================================================

[meshtnc_ultra]
extends = esp32_base
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.arduino.memory_type = opi_opi   ; 2MB OPI PSRAM
build_flags =
  ${esp32_base.build_flags}
  -I variants/meshtnc_ultra
  -D MESHTNC_ULTRA
  -U RADIOLIB_EXCLUDE_SX128X
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D PIN_USER_BTN=0
  ; --- SX1281 pins (SPI2, GPIO matrix) — netlist verified ---
  -D P_SX1281_NSS=10
  -D P_SX1281_SCLK=12
  -D P_SX1281_MOSI=11
  -D P_SX1281_MISO=13
  -D P_SX1281_DIO1=9
  -D P_SX1281_BUSY=8
  -D P_SX1281_TXEN=39
  -D P_SX1281_RXEN=40
  ; --- SX1281 RF switch (U8 RFASWA630ATF09 VCTL, after AT2401C PA) ---
  -D P_SX1281_RF_SW=14
  ; --- SX1276 pins (SPI3, GPIO matrix) — netlist verified ---
  -D P_SX1276_NSS=4
  -D P_SX1276_SCLK=6
  -D P_SX1276_MOSI=5
  -D P_SX1276_MISO=7
  -D P_SX1276_DIO0=19
  -D P_SX1276_DIO1=20
  ; Note: both radio NRESETs tied to CHIP_PU — not GPIO-controlled, use RADIOLIB_NC in firmware
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/meshtnc_ultra>
lib_deps =
  ${esp32_base.lib_deps}

[env:meshtnc_ultra_Repeater]
extends = meshtnc_ultra
build_src_filter = ${meshtnc_ultra.build_src_filter}
  +<../examples/simple_repeater/main.cpp>
build_flags =
  ${meshtnc_ultra.build_flags}
  -D ADVERT_NAME='"MeshTNC Ultra"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=8
lib_deps =
  ${meshtnc_ultra.lib_deps}
  ${esp32_ota.lib_deps}
