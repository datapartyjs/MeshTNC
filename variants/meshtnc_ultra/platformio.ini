; ============================================================
; MeshTNC Ultra — single firmware, dual-radio (TEMPORARY)
; Hardware: ESP32-S3FH4R2 + SX1281MLTRT (2.4GHz) + SX1276MLTRT (915MHz)
;           Two independent RF switches (RFT25W6630ATF09), one per radio, shared coaxial output
;
; Both radios are compiled into one firmware image.
; Radio selection and frequency parameters are handled in target.cpp —
; NOT via build flags.
;
; Pin verification status (from Sourceparts_Capstone-v1.0 SCH PDF):
;   Confirmed: SX1281 NSS=10 SCLK=12 MOSI=11 MISO=13 DIO1=8 BUSY=9 TXEN=39 RXEN=40
;   Confirmed: SX1276 DIO0=19 DIO1=20
;   VERIFY from KiCad source: SX1276 NSS/SCLK/MOSI/MISO (GPIO33-37 may conflict with OPI PSRAM)
; ============================================================

[meshtnc_ultra]
extends = esp32_base
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.arduino.memory_type = opi_opi   ; 2MB OPI PSRAM
build_flags =
  ${esp32_base.build_flags}
  -I variants/meshtnc_ultra
  -D MESHTNC_ULTRA
  -U RADIOLIB_EXCLUDE_SX128X
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D PIN_USER_BTN=0
  ; --- SX1281 pins (SPI2, IOMUX — VERIFY from KiCad) ---
  -D P_SX1281_NSS=10
  -D P_SX1281_SCLK=12
  -D P_SX1281_MOSI=11
  -D P_SX1281_MISO=13
  -D P_SX1281_DIO1=8
  -D P_SX1281_BUSY=9
  -D P_SX1281_TXEN=39
  -D P_SX1281_RXEN=40
  ; --- SX1276 pins (SPI3, GPIO matrix — VERIFY NSS/SCLK/MOSI/MISO from KiCad source) ---
  ; WARNING: GPIO33-37 may conflict with OPI PSRAM on ESP32-S3FH4R2 — verify before flashing
  -D P_SX1276_NSS=33
  -D P_SX1276_SCLK=36
  -D P_SX1276_MOSI=35
  -D P_SX1276_MISO=37
  -D P_SX1276_DIO0=19
  -D P_SX1276_DIO1=20
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/meshtnc_ultra>
lib_deps =
  ${esp32_base.lib_deps}

[env:meshtnc_ultra_Repeater]
extends = meshtnc_ultra
build_src_filter = ${meshtnc_ultra.build_src_filter}
  +<../examples/simple_repeater/main.cpp>
build_flags =
  ${meshtnc_ultra.build_flags}
  -D ADVERT_NAME='"MeshTNC Ultra"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=8
lib_deps =
  ${meshtnc_ultra.lib_deps}
  ${esp32_ota.lib_deps}
